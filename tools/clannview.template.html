<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clann tree viewer</title>
<style>
  :root{
    --font-sans:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;

    --stone-50:#FAF6EE; --stone-100:#F3ECDF; --stone-200:#E7DBC6; --stone-300:#D5C4A6;
    --stone-400:#B7A283; --stone-500:#8E7A5E; --stone-600:#6A5A43; --stone-700:#4B4031;
    --stone-800:#2E2820; --stone-900:#1A160F;
    --clay-400:#C56347; --clay-500:#A94B2E; --clay-600:#8C3A22;
    --moss-300:#9CAA6A; --moss-500:#5F6E33;
    --compute-200:#7FCFC4; --compute-400:#149589; --compute-500:#0B7268; --compute-glow:#36E0C8;
    --amber-400:#D99A2B; --amber-500:#B97E1C;

    --bg:var(--stone-50); --panel:#ffffff; --ink:var(--stone-900); --muted:var(--stone-600); --line:var(--stone-300);
    --branch:var(--stone-700); --accent:var(--compute-500); --dup:var(--clay-500); --spec:var(--stone-700);
    --loss:var(--stone-400); --sel:var(--compute-500); --hl:var(--amber-400);
    --shadow-sm:0 1px 3px rgba(46,40,32,.08),0 1px 2px rgba(46,40,32,.05);
    --shadow-md:0 8px 22px rgba(46,40,32,.16);
  }
  :root[data-theme="dark"]{
    --bg:var(--stone-900); --panel:var(--stone-800); --ink:var(--stone-50); --muted:var(--stone-400); --line:var(--stone-700);
    --branch:var(--stone-300); --accent:var(--compute-glow); --dup:var(--clay-400); --spec:var(--stone-300);
    --loss:var(--stone-500); --sel:var(--compute-glow); --hl:var(--amber-400);
    --shadow-sm:0 1px 3px rgba(0,0,0,.35); --shadow-md:0 10px 26px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:13px/1.45 var(--font-sans);
       color:var(--ink);background:var(--bg);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:center;gap:14px;padding:9px 14px;border-bottom:1px solid var(--line);
    background:var(--panel);border-top:3px solid var(--clay-500)}
  header .title{font-weight:700;text-transform:uppercase;letter-spacing:.01em;font-size:13px}
  header .meta{color:var(--muted);font-size:12px;font-family:var(--font-mono)}
  header .meta b{color:var(--ink);font-weight:600}
  .spacer{flex:1}
  #nav{display:none;align-items:center;gap:5px}
  #nav button{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:5px;
              width:26px;height:24px;cursor:pointer;font-size:11px;line-height:1}
  #nav button:hover{border-color:var(--accent);color:var(--accent)}
  #nav select{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:5px;
              padding:3px 6px;font:inherit;font-family:var(--font-mono);font-size:12px;max-width:220px}
  #nav input[type=search]{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:5px;
              padding:3px 7px;font:inherit;width:130px}
  #nav input[type=search].hit{border-color:var(--accent)}
  #nav input[type=search].miss{border-color:var(--dup)}
  main{flex:1;display:flex;min-height:0}
  #side{width:236px;flex:none;border-right:1px solid var(--line);background:var(--panel);
        overflow:auto;padding:12px}
  #side h4{margin:16px 0 7px;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-family:var(--font-mono);font-weight:500}
  #side h4:first-child{margin-top:0}
  .row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12.5px}
  .row label{flex:1;user-select:none}
  .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{flex:1;border:0;background:transparent;color:var(--ink);padding:5px 6px;cursor:pointer;font:inherit;font-size:12px}
  .seg button.on{background:var(--accent);color:#fff}
  :root[data-theme="dark"] .seg button.on{color:var(--stone-900)}
  input[type=range]{width:100%;accent-color:var(--accent)}
  input[type=search]{width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink)}
  input[type=search]:focus-visible,select:focus-visible,button:focus-visible{outline:none;
    box-shadow:0 0 0 3px color-mix(in srgb, var(--compute-400) 35%, transparent);border-color:var(--compute-400)}
  button.act{width:100%;padding:6px 9px;border:1px solid var(--line);border-radius:6px;background:var(--bg);
    color:var(--ink);cursor:pointer;margin:4px 0;font:inherit;font-size:12.5px;transition:border-color 140ms,transform 80ms}
  button.act:hover{border-color:var(--accent)}
  button.act:active{transform:translateY(1px)}
  button.act.warn{color:var(--dup);border-color:var(--dup)}
  button.act.warn:hover{background:var(--dup);color:#fff}
  #wrap{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block;cursor:grab;background:var(--bg)}
  svg.grab{cursor:grabbing}
  svg.reroot{cursor:crosshair}
  .branch{stroke:var(--branch);stroke-width:1.5;fill:none}
  .branch.hit{stroke:transparent;stroke-width:9;cursor:pointer}
  .branch.sel{stroke:var(--sel);stroke-width:2.5}
  .lossbranch{stroke:var(--loss);stroke-width:1.4;stroke-dasharray:3 3;fill:none}
  .leaflabel{fill:var(--ink);cursor:default;font-family:var(--font-mono)}
  .leaflabel.dim{fill:var(--muted)}
  .leaflabel.hl{fill:var(--clay-600)}
  :root[data-theme="dark"] .leaflabel.hl{fill:var(--amber-400)}
  .intlabel{fill:var(--muted);font-size:10px;font-family:var(--font-mono)}
  .support{fill:var(--muted);font-size:10px;font-family:var(--font-mono)}
  .nodeglyph{cursor:pointer}
  .hlbox{fill:var(--hl);opacity:.35}
  .collapsed{fill:var(--branch);opacity:.85;cursor:pointer}
  .tip{position:absolute;pointer-events:none;background:var(--panel);border:1px solid var(--line);
       border-radius:8px;padding:7px 9px;font-size:12px;box-shadow:var(--shadow-md);max-width:280px;display:none;z-index:5}
  .tip b{color:var(--ink)} .tip .ev{font-weight:700;font-family:var(--font-mono)}
  .legend{position:absolute;left:12px;bottom:12px;background:var(--panel);border:1px solid var(--line);
          border-radius:8px;padding:9px 11px;font-size:12px;box-shadow:var(--shadow-sm)}
  .legend div{display:flex;align-items:center;gap:8px;margin:4px 0}
  .sw{width:13px;height:13px;flex:none;display:inline-block}
  .hint{color:var(--muted);font-size:11px;margin-top:7px;line-height:1.45}
  kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 4px;font-size:11px;
    background:var(--bg);font-family:var(--font-mono)}
</style>
</head>
<body>
<header>
  <span class="title" id="hTitle">Clann tree viewer</span>
  <span id="nav">
    <input type="search" id="treeSearch" placeholder="filter trees…" title="Filter trees by name, number, or a taxon they contain">
    <button id="prevT" title="Previous match (←)">◀</button>
    <select id="selT" title="Jump to tree"></select>
    <button id="nextT" title="Next match (→)">▶</button>
    <span class="meta" id="cntT"></span>
  </span>
  <span class="meta" id="hMeta"></span>
  <span class="spacer"></span>
  <button class="act" style="width:auto" id="themeBtn" title="Toggle light/dark">◐</button>
</header>
<main>
  <aside id="side">
    <h4>Layout</h4>
    <div class="row"><div class="seg" id="segLayout" style="flex:1">
      <button data-v="clado" class="on">Cladogram</button><button data-v="phylo">Phylogram</button>
    </div></div>
    <div class="row"><label>Row spacing</label></div>
    <input type="range" id="vspace" min="10" max="46" value="20">
    <div class="row"><label>Font size</label></div>
    <input type="range" id="fsize" min="8" max="20" value="12">

    <h4>Show</h4>
    <div class="row"><label for="tSupport">Support values</label><input type="checkbox" id="tSupport" checked></div>
    <div class="row"><label for="tLen">Branch lengths</label><input type="checkbox" id="tLen"></div>
    <div class="row"><label for="tInt">Internal labels</label><input type="checkbox" id="tInt"></div>
    <div class="row"><label for="tAlign">Align tip labels</label><input type="checkbox" id="tAlign"></div>
    <div class="row" id="rowLoss"><label for="tLoss">Losses</label><input type="checkbox" id="tLoss" checked></div>
    <div class="row" id="rowScale"><label for="tScale">Scale bar</label><input type="checkbox" id="tScale" checked></div>

    <h4>Find</h4>
    <input type="search" id="find" placeholder="highlight taxa (comma-sep)…">

    <h4>Edit</h4>
    <div class="row"><label>Reroot mode</label><input type="checkbox" id="rerootMode"></div>
    <div class="hint">Click a branch to reroot there. Click a node dot to collapse/expand.</div>
    <button class="act" id="ladder">Ladderize ⇅</button>
    <button class="act" id="expandAll">Expand all</button>
    <button class="act warn" id="reset">Reset view</button>

    <h4>Export</h4>
    <button class="act" id="expSvg">Download SVG</button>
    <button class="act" id="expPdf">Download PDF</button>
    <button class="act" id="expNwk">Copy Newick (current rooting)</button>
    <div class="hint" style="margin-top:10px">Scroll to zoom · drag to pan · <kbd>R</kbd> reroot toggle</div>
  </aside>
  <div id="wrap">
    <svg id="svg"><g id="scene"></g></svg>
    <div class="tip" id="tip"></div>
    <div class="legend" id="legend"></div>
  </div>
</main>

<script>
/* ============================ EMBEDDED DATA ============================
   Clann replaces the DATA object below. Format:
   { type:"tree"|"reconciliation", meta:{...},
     tree:{ name, length, support, event, species, children:[...] } }
   event ∈ {null|"speciation"|"duplication"|"loss"}; species = mapped species name. */
const DATA = /*CLANN_DATA_BEGIN*/
{

 "trees": [

   "tree": {

        "length": 0.05

/* ====================================================================== */

// ---------- model ----------
let ID=0;
function build(n, parent){
  n.id=ID++; n.parent=parent||null; n.collapsed=false;
  n.children=(n.children||[]).map(c=>build(c,n));
  n.isLeaf = n.children.length===0 && n.event!=="loss";
  n.isLoss = n.event==="loss";
  // a whole clade is "lost" if every descendant leaf is a loss: draw all its
  // internal branches dotted too, not just the leaf stubs.
  n.lost = n.children.length ? n.children.every(c=>c.lost) : n.isLoss;
  return n;
}
function leaves(n,acc){acc=acc||[];if(n.collapsed||(!n.children.length)){if(!n.lost||showLoss)acc.push(n);}else n.children.forEach(c=>leaves(c,acc));return acc;}
function each(n,f){f(n);n.children.forEach(c=>each(c,f));}
function depthOf(n){let d=0,p=n;while(p.parent){d++;p=p.parent;}return d;}
function maxDepth(root){let m=0;each(root,n=>{if(!n.collapsed){m=Math.max(m,depthOf(n));}});return m;}

// ---------- state ----------
const isRecon = DATA.type==="reconciliation";
// normalise to a list of trees (single-tree files still work)
const TREES = Array.isArray(DATA.trees) ? DATA.trees
            : [{name:(DATA.meta&&DATA.meta.title)||(isRecon?"reconciliation":"tree"), tree:DATA.tree,
                score:DATA.meta&&DATA.meta.score, dups:DATA.meta&&DATA.meta.dups, losses:DATA.meta&&DATA.meta.losses}];
let curIdx=0;
function curEntry(){ return TREES[curIdx]||{}; }
let root=build(structuredClone(curEntry().tree),null);
let showLoss=true, layout="clado", vspace=20, fsize=12;
let opt={support:true,len:false,intl:false,align:false,scale:true};
let view={k:1,x:40,y:20};
let rerootOn=false, hlSet=new Set();

// ---------- layout ----------
function computeLayout(){
  // y by leaf order
  const ls=[]; (function order(n){ if(n.collapsed||!n.children.length){ if(!n.lost||showLoss) ls.push(n);} else n.children.forEach(order);} )(root);
  ls.forEach((n,i)=>n._y=i*vspace);
  // internal y = mean of visible children
  (function setY(n){
    if(n.collapsed||!n.children.length) return n._y;
    const ys=n.children.filter(c=>!c.lost||showLoss).map(setY);
    n._y = ys.length? (Math.min(...ys)+Math.max(...ys))/2 : (n._y||0);
    return n._y;
  })(root);
  // x
  const md=Math.max(1,maxDepth(root));
  let maxLen=0; (function cl(n,acc){n._cl=acc;maxLen=Math.max(maxLen,acc);if(!n.collapsed)n.children.forEach(c=>cl(c,acc+(c.length||0)));})(root,0);
  const W=Math.max(360, (typeof innerWidth!=='undefined'?innerWidth:900)-560);
  const xstep=Math.max(26, W/(md+1));
  each(root,n=>{
    if(layout==="phylo" && maxLen>0){ n._x = (n._cl/maxLen)*(W-10); }
    else { n._x = depthOf(n)*xstep; }
  });
  root._x = layout==="phylo"?0:0;
  return {ls, W, maxLen};
}

// ---------- render ----------
const svg=document.getElementById('svg'), scene=document.getElementById('scene'), tip=document.getElementById('tip');
function el(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function render(){
  const {ls}=computeLayout();
  scene.innerHTML='';
  const tipX = Math.max(...leaves(root).map(n=>n._x));
  // edges
  each(root,n=>{
    if(!n.parent) return;
    if(n.lost && !showLoss) return;
    const p=n.parent;
    const cls = n.lost?'lossbranch':'branch';
    // elbow: vertical at parent.x, horizontal to n.x
    const path=`M${p._x},${p._y} V${n._y} H${n._x}`;
    scene.appendChild(el('path',{d:path,class:cls}));
    if(!n.lost){
      const hit=el('path',{d:path,class:'branch hit','data-id':n.id});
      hit.addEventListener('click',ev=>{ev.stopPropagation(); if(rerootOn) doReroot(n); else selectBranch(n);});
      hit.addEventListener('mousemove',e=>showTip(e,n,true));
      hit.addEventListener('mouseleave',hideTip);
      scene.appendChild(hit);
    }
  });
  // vertical connectors handled by V in path above; but ensure the parent's vertical spans children:
  each(root,n=>{
    if(n.collapsed||n.children.length<2) return;
    const vis=n.children.filter(c=>!c.lost||showLoss);
    if(vis.length<2) return;
    const y0=Math.min(...vis.map(c=>c._y)), y1=Math.max(...vis.map(c=>c._y));
    scene.appendChild(el('path',{d:`M${n._x},${y0} V${y1}`,class:n.lost?'lossbranch':'branch'}));
  });
  // nodes + labels
  each(root,n=>{
    if(n.isLoss){ if(showLoss){ // loss stub marker
        scene.appendChild(el('circle',{cx:n._x,cy:n._y,r:3.2,fill:'none',stroke:'var(--loss)','stroke-width':1.4}));
        const t=el('text',{x:n._x+7,y:n._y+3.5,class:'intlabel','font-size':Math.max(9,fsize-2)});
        t.textContent='✕ '+(n.species||'loss'); t.style.fill='var(--loss)'; scene.appendChild(t);
      } return; }
    if(n.collapsed){
      // triangle
      const nleaf=leaves(n).length||1, h=Math.min(60,6+nleaf*3);
      const tri=el('path',{d:`M${n._x},${n._y} L${n._x+34},${n._y-h/2} L${n._x+34},${n._y+h/2} Z`,class:'collapsed'});
      tri.addEventListener('click',ev=>{ev.stopPropagation();n.collapsed=false;render();});
      scene.appendChild(tri);
      const t=el('text',{x:n._x+40,y:n._y+4,class:'leaflabel','font-size':fsize});
      t.textContent=(n.name||('▸ '+nleaf+' taxa')); scene.appendChild(t);
      return;
    }
    if(n.isLeaf){
      const lx = opt.align? tipX+8 : n._x+7;
      if(opt.align && lx>n._x+7) scene.appendChild(el('path',{d:`M${n._x},${n._y} H${lx-3}`,class:'lossbranch'}));
      const t=el('text',{x:lx,y:n._y+fsize*0.34,class:'leaflabel','font-size':fsize});
      t.textContent=n.name||'?';
      if(hlSet.size){ if(matchHL(n)) t.classList.add('hl'); else t.classList.add('dim'); }
      t.addEventListener('mousemove',e=>showTip(e,n,false));
      t.addEventListener('mouseleave',hideTip);
      scene.appendChild(t);
    }
    // node glyph (event) -- suppressed inside a fully-lost clade (drawn dotted)
    if(n.lost){ /* no glyph on lost internal nodes */ }
    else if(isRecon && n.children.length){
      let g;
      if(n.event==="duplication"){ g=el('rect',{x:n._x-4,y:n._y-4,width:8,height:8,fill:'var(--dup)',class:'nodeglyph'}); }
      else { g=el('circle',{cx:n._x,cy:n._y,r:3,fill:'var(--spec)',class:'nodeglyph'}); }
      g.setAttribute('data-id',n.id);
      g.addEventListener('click',ev=>{ev.stopPropagation(); n.collapsed=!n.collapsed; render();});
      g.addEventListener('mousemove',e=>showTip(e,n,false));
      g.addEventListener('mouseleave',hideTip);
      scene.appendChild(g);
    } else if(!isRecon && n.children.length){
      const g=el('circle',{cx:n._x,cy:n._y,r:2.6,fill:'var(--branch)',class:'nodeglyph'});
      g.addEventListener('click',ev=>{ev.stopPropagation();n.collapsed=!n.collapsed;render();});
      scene.appendChild(g);
    }
    // support / internal labels
    if(n.children.length && !n.collapsed){
      if(opt.support && n.support!=null){
        const t=el('text',{x:n._x-4,y:n._y-5,class:'support','text-anchor':'end'}); t.textContent=n.support; scene.appendChild(t);
      }
      if(opt.intl && n.name){
        const t=el('text',{x:n._x+5,y:n._y-5,class:'intlabel'}); t.textContent=n.name; scene.appendChild(t);
      }
    }
  });
  // branch length labels
  if(opt.len && layout==="phylo"){
    each(root,n=>{ if(n.parent && n.length && !n.isLoss){ const t=el('text',{x:(n.parent._x+n._x)/2,y:n._y-3,class:'support','text-anchor':'middle'}); t.textContent=(+n.length).toFixed(3); scene.appendChild(t);} });
  }
  applyView();
  drawLegend();
}
function selectBranch(n){ document.querySelectorAll('.branch.sel').forEach(e=>e.classList.remove('sel')); }
function matchHL(n){ const s=(n.name||'')+' '+(n.species||''); return [...hlSet].some(q=>s.toLowerCase().includes(q)); }

// ---------- reroot ----------
function doReroot(node){
  // reroot on the edge above `node`: new root between node and node.parent
  if(!node.parent) return;
  // collect path node -> ... -> oldroot
  const nr={name:"",children:[],event:isRecon?"speciation":null};
  let cur=node, par=node.parent;
  // detach node from par
  removeChild(par,cur);
  nr.children.push(cur); cur.parent=nr;
  // reverse the chain up to root
  let prev=nr, child=par;
  while(child){
    const up=child.parent;
    if(up) removeChild(up,child);
    child.parent=prev; prev.children.push(child);
    prev=child; child=up;
  }
  // recompute events for recon (mapping is now stale -> mark unknown)
  ID=0; root=build(nr,null);
  if(isRecon){ each(root,n=>{ if(n.children.length && !n.isLoss){ n.event=n.event||"speciation"; }}); staleWarn=true; updateMeta(); }
  render();
}
function removeChild(p,c){ p.children=p.children.filter(x=>x!==c); }
let staleWarn=false;

// ---------- newick ----------
function toNewick(n){
  if(!n.children.length){ return (n.name||'').replace(/[(),:;]/g,'_') + (n.length!=null?':'+n.length:''); }
  return '('+n.children.filter(c=>!c.isLoss).map(toNewick).join(',')+')'+(n.support!=null?n.support:'')+(n.length!=null?':'+n.length:'');
}

// ---------- view / zoom / pan ----------
function applyView(){ scene.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`); }
svg.addEventListener('wheel',e=>{e.preventDefault();const r=svg.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=Math.exp(-e.deltaY*0.0015); const nk=Math.min(8,Math.max(0.15,view.k*f));
  view.x=mx-(mx-view.x)*(nk/view.k); view.y=my-(my-view.y)*(nk/view.k); view.k=nk; applyView();},{passive:false});
let drag=null;
svg.addEventListener('mousedown',e=>{ if(e.target.classList.contains('branch')&&e.target.classList.contains('hit'))return; drag={x:e.clientX-view.x,y:e.clientY-view.y}; svg.classList.add('grab');});
window.addEventListener('mousemove',e=>{ if(drag){view.x=e.clientX-drag.x;view.y=e.clientY-drag.y;applyView();}});
window.addEventListener('mouseup',()=>{drag=null;svg.classList.remove('grab');});

// ---------- tooltip ----------
function showTip(e,n,isBranch){
  const r=document.getElementById('wrap').getBoundingClientRect();
  let h='';
  if(n.isLeaf||!n.children.length){ h=`<b>${n.name||'?'}</b>`; if(n.species)h+=`<br>species: <b>${n.species}</b>`; }
  else { h=`<span class="ev" style="color:${n.event==='duplication'?'var(--dup)':'var(--spec)'}">${(n.event||'node').toUpperCase()}</span>`;
         h+=`<br>${countLeaves(n)} descendant tips`; if(n.support!=null)h+=`<br>support: ${n.support}`; }
  if(isBranch && n.length!=null) h+=`<br>length: ${(+n.length).toFixed(4)}`;
  if(isBranch) h+=`<br><span style="color:var(--muted)">${rerootOn?'click: reroot here':'click a node dot to collapse'}</span>`;
  tip.innerHTML=h; tip.style.display='block';
  tip.style.left=Math.min(r.width-tip.offsetWidth-6, e.clientX-r.left+12)+'px';
  tip.style.top=(e.clientY-r.top+12)+'px';
}
function hideTip(){tip.style.display='none';}
function countLeaves(n){let c=0;each(n,x=>{if(!x.children.length&&!x.isLoss)c++;});return c;}

// ---------- legend ----------
function drawLegend(){
  const L=document.getElementById('legend');
  if(!isRecon){L.style.display='none';return;}
  L.style.display='block';
  L.innerHTML=`<div><span class="sw" style="background:var(--dup)"></span>Duplication</div>`+
    `<div><span class="sw" style="background:var(--spec);border-radius:50%"></span>Speciation</div>`+
    (showLoss?`<div><span class="sw" style="border:1.4px dashed var(--loss)"></span>Loss</div>`:'');
}

// ---------- controls ----------
function updateMeta(){
  const m=DATA.meta||{}, e=curEntry();
  document.getElementById('hTitle').textContent=e.name||m.title||(isRecon?'Reconciliation':'Tree');
  let s=[];
  if(m.dataset)s.push(m.dataset);
  if(m.criterion)s.push('criterion: <b>'+m.criterion+'</b>');
  if(m.lossmodel)s.push('lossmodel: <b>'+m.lossmodel+'</b>');
  if(e.score!=null)s.push('score: <b>'+e.score+'</b>');
  if(e.dups!=null)s.push('<b>'+e.dups+'</b> dup');
  if(e.losses!=null)s.push('<b>'+e.losses+'</b> loss');
  if(staleWarn)s.push('<span style="color:var(--dup)">⚠ re-rooted: mapping stale</span>');
  document.getElementById('hMeta').innerHTML=s.join(' · ');
}
let filtered = TREES.map((_,i)=>i);   // tree indices currently matching the filter
function treeLabel(i){ const t=TREES[i]; return (t.name||('tree '+(i+1)))+(t.score!=null?'  ('+t.score+')':''); }
function navCounter(){
  const c=document.getElementById('cntT'), pos=filtered.indexOf(curIdx);
  if(filtered.length===TREES.length) c.textContent=(curIdx+1)+' / '+TREES.length;
  else c.textContent=(pos>=0?(pos+1):'–')+' / '+filtered.length+' matched (of '+TREES.length+')';
}
function rebuildDropdown(){
  const sel=document.getElementById('selT'); sel.innerHTML='';
  filtered.forEach(i=>{ const o=document.createElement('option'); o.value=i; o.textContent=treeLabel(i); sel.appendChild(o); });
  if(filtered.indexOf(curIdx)>=0) sel.value=curIdx;
}
function loadTree(i){
  curIdx=i;
  ID=0; root=build(structuredClone(curEntry().tree),null);
  staleWarn=false; hlSet=new Set(); document.getElementById('find').value='';
  view={k:1,x:40,y:20};
  const sel=document.getElementById('selT'); if([...sel.options].some(o=>+o.value===i)) sel.value=i;
  navCounter(); updateMeta(); render();
}
function stepTree(d){
  if(!filtered.length) return;
  let pos=filtered.indexOf(curIdx); if(pos<0) pos = d>0?-1:0;
  loadTree(filtered[(pos+d+filtered.length)%filtered.length]);
}
function applyTreeFilter(q){
  const box=document.getElementById('treeSearch');
  q=(q||'').trim().toLowerCase();
  filtered = !q ? TREES.map((_,i)=>i)
                : TREES.map((_,i)=>i).filter(i=> TREES[i]._search.includes(q) || String(i+1)===q );
  box.classList.toggle('hit', !!q && filtered.length>0);
  box.classList.toggle('miss', !!q && filtered.length===0);
  rebuildDropdown(); navCounter();
  if(filtered.length && filtered.indexOf(curIdx)<0) loadTree(filtered[0]);   // jump to first match
}
function setupNav(){
  const nav=document.getElementById('nav');
  // precompute per-tree search text: name + contained taxa (leaf names & species)
  TREES.forEach((e,i)=>{
    const taxa=new Set();
    (function walk(n){ if(!n) return;
      if(!n.children||!n.children.length){ if(n.name)taxa.add(String(n.name).toLowerCase()); if(n.species)taxa.add(String(n.species).toLowerCase()); }
      else (n.children||[]).forEach(walk); })(e.tree);
    e._search = String(e.name||('tree_'+i)).toLowerCase()+' '+[...taxa].join(' ');
  });
  if(TREES.length<2){ nav.style.display='none'; return; }
  nav.style.display='inline-flex';
  rebuildDropdown();
  document.getElementById('selT').onchange=e=>loadTree(+e.target.value);
  document.getElementById('prevT').onclick=()=>stepTree(-1);
  document.getElementById('nextT').onclick=()=>stepTree(1);
  document.getElementById('treeSearch').oninput=e=>applyTreeFilter(e.target.value);
  navCounter();
}
document.getElementById('segLayout').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');layout=b.dataset.v;
  document.getElementById('rowScale').style.display=layout==='phylo'?'flex':'none';render();});
document.getElementById('vspace').oninput=e=>{vspace=+e.target.value;render();};
document.getElementById('fsize').oninput=e=>{fsize=+e.target.value;render();};
const chk=(id,k)=>{document.getElementById(id).onchange=e=>{opt[k]=e.target.checked;render();};};
chk('tSupport','support');chk('tLen','len');chk('tInt','intl');chk('tAlign','align');chk('tScale','scale');
document.getElementById('tLoss').onchange=e=>{showLoss=e.target.checked;render();};
document.getElementById('find').oninput=e=>{hlSet=new Set(e.target.value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean));render();};
document.getElementById('rerootMode').onchange=e=>{rerootOn=e.target.checked;svg.classList.toggle('reroot',rerootOn);};
document.getElementById('ladder').onclick=()=>{ (function lad(n){n.children.sort((a,b)=>countLeaves(a)-countLeaves(b));n.children.forEach(lad);})(root); render();};
document.getElementById('expandAll').onclick=()=>{each(root,n=>n.collapsed=false);render();};
document.getElementById('reset').onclick=()=>loadTree(curIdx);
document.getElementById('themeBtn').onclick=()=>{const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';};
function exportTitle(){return (DATA.meta&&DATA.meta.title)||'tree';}
// Self-contained copy of the current SVG view with computed styles inlined, so it
// renders identically when detached from the page (the .branch/.leaflabel CSS and
// its var(--...) colours live in the page <style>, not the SVG). Used by both the
// SVG and PDF exports. Returns {svg, w, h} in CSS px.
function serializeSvgInlined(){
  const rect=svg.getBoundingClientRect();
  const clone=svg.cloneNode(true);
  const props=['fill','stroke','stroke-width','stroke-dasharray','stroke-linecap',
    'stroke-linejoin','opacity','font-family','font-size','font-weight','text-anchor','dominant-baseline'];
  const srcEls=svg.querySelectorAll('*'), clEls=clone.querySelectorAll('*');
  for(let i=0;i<srcEls.length;i++){
    const cs=getComputedStyle(srcEls[i]); let st='';
    for(const p of props){const v=cs.getPropertyValue(p); if(v&&v!=='none'||p==='fill'||p==='stroke') st+=p+':'+v+';';}
    clEls[i].setAttribute('style',st); clEls[i].removeAttribute('class');
  }
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width',rect.width); clone.setAttribute('height',rect.height);
  clone.setAttribute('viewBox','0 0 '+rect.width+' '+rect.height);
  return {svg:new XMLSerializer().serializeToString(clone), w:rect.width, h:rect.height};
}
document.getElementById('expSvg').onclick=()=>{const s=serializeSvgInlined().svg;const b=new Blob([s],{type:'image/svg+xml'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=exportTitle()+'.svg';a.click();};
// Build a minimal single-page PDF wrapping a JPEG (DCTDecode) of the current view.
// No external libraries — assembled by hand so the viewer stays self-contained.
function jpegToPdf(jpg,imgW,imgH,pageW,pageH){
  const enc=s=>new TextEncoder().encode(s);
  const chunks=[]; let len=0; const off=[];
  const push=u8=>{chunks.push(u8); len+=u8.length;};
  const put=s=>push(enc(s));
  const pw=Math.round(pageW),ph=Math.round(pageH);
  const content='q '+pw+' 0 0 '+ph+' 0 0 cm /Im0 Do Q';
  put('%PDF-1.3\n');
  const obj=(n,body)=>{off[n]=len; put(n+' 0 obj\n'+body+'\nendobj\n');};
  obj(1,'<< /Type /Catalog /Pages 2 0 R >>');
  obj(2,'<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  obj(3,'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+pw+' '+ph+'] '
       +'/Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>');
  off[4]=len;
  put('4 0 obj\n<< /Type /XObject /Subtype /Image /Width '+imgW+' /Height '+imgH
      +' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+jpg.length+' >>\nstream\n');
  push(jpg); put('\nendstream\nendobj\n');
  obj(5,'<< /Length '+content.length+' >>\nstream\n'+content+'\nendstream');
  const xrefAt=len;
  let xref='xref\n0 6\n0000000000 65535 f \n';
  for(let i=1;i<=5;i++) xref+=String(off[i]).padStart(10,'0')+' 00000 n \n';
  put(xref+'trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n'+xrefAt+'\n%%EOF');
  const out=new Uint8Array(len); let o=0; for(const c of chunks){out.set(c,o); o+=c.length;}
  return out;
}
document.getElementById('expPdf').onclick=()=>{
  const btn=document.getElementById('expPdf'), label=btn.textContent;
  btn.textContent='Rendering…'; btn.disabled=true;
  const done=ok=>{btn.disabled=false; btn.textContent=ok?label:'PDF failed — try SVG'; if(!ok)setTimeout(()=>btn.textContent=label,1800);};
  try{
    const {svg:s,w,h}=serializeSvgInlined();
    const scale=Math.min(3,Math.max(2,window.devicePixelRatio||1)); // crisp raster
    const img=new Image();
    const url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml;charset=utf-8'}));
    img.onload=()=>{
      try{
        const cw=Math.max(1,Math.round(w*scale)),ch=Math.max(1,Math.round(h*scale));
        const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        const ctx=cv.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cw,ch);
        ctx.drawImage(img,0,0,cw,ch); URL.revokeObjectURL(url);
        const b64=cv.toDataURL('image/jpeg',0.92).split(',')[1], bin=atob(b64);
        const jpg=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) jpg[i]=bin.charCodeAt(i);
        const pdf=jpegToPdf(jpg,cw,ch,w,h);
        const a=document.createElement('a');
        a.href=URL.createObjectURL(new Blob([pdf],{type:'application/pdf'}));
        a.download=exportTitle()+'.pdf'; a.click();
        done(true);
      }catch(err){URL.revokeObjectURL(url); done(false);}
    };
    img.onerror=()=>{URL.revokeObjectURL(url); done(false);};
    img.src=url;
  }catch(err){done(false);}
};
document.getElementById('expNwk').onclick=()=>{const nwk=toNewick(root)+';';navigator.clipboard&&navigator.clipboard.writeText(nwk);document.getElementById('expNwk').textContent='Copied ✓';setTimeout(()=>document.getElementById('expNwk').textContent='Copy Newick (current rooting)',1200);};
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='r'||e.key==='R'){const c=document.getElementById('rerootMode');c.checked=!c.checked;c.onchange({target:c});}
  else if(e.key==='ArrowLeft'&&TREES.length>1)stepTree(-1);
  else if(e.key==='ArrowRight'&&TREES.length>1)stepTree(1);
});
window.addEventListener('resize',render);

// init
if(!isRecon){document.getElementById('rowLoss').style.display='none';document.getElementById('legend').style.display='none';}
document.getElementById('rowScale').style.display=layout==='phylo'?'flex':'none';
setupNav(); updateMeta(); render();
</script>
</body>
</html>
