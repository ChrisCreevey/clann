<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clann — web client</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1a1c1f; --muted:#6b7280;
    --line:#e4e7eb; --accent:#2563eb; --accent-ink:#ffffff; --chip:#eef2ff;
    --ok:#15803d; --warn:#b45309; --err:#b91c1c; --logbg:#0f1419; --logink:#d7dde3;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0f1113; --panel:#181b1f; --ink:#e8eaed; --muted:#9aa1ab;
      --line:#2a2f36; --accent:#3b82f6; --accent-ink:#ffffff; --chip:#1e293b;
      --ok:#4ade80; --warn:#fbbf24; --err:#f87171; --logbg:#0b0e11; --logink:#cbd5e1; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  header{display:flex;align-items:baseline;gap:12px;padding:16px 22px;
    border-bottom:1px solid var(--line);background:var(--panel);}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:13px}
  main{max-width:1000px;margin:0 auto;padding:22px;display:grid;gap:18px;
    grid-template-columns:1fr 1fr;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:16px 18px;}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);margin:0 0 12px;font-weight:600}
  .full{grid-column:1 / -1}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:14px}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0;font-variant-numeric:tabular-nums}
  select,button,input[type=text]{font:inherit}
  select,input[type=text]{width:100%;padding:9px 10px;border:1px solid var(--line);
    border-radius:8px;background:var(--bg);color:var(--ink)}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  .blurb{margin:8px 0 0;color:var(--muted);font-size:14px;min-height:1.4em}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:8px;
    background:var(--bg);color:var(--ink);cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .chip{display:inline-block;background:var(--chip);border-radius:999px;
    padding:2px 10px;font-size:12px;color:var(--accent)}
  .muted{color:var(--muted)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}
  pre.log{background:var(--logbg);color:var(--logink);border-radius:8px;padding:12px 14px;
    max-height:340px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12.5px;line-height:1.45;white-space:pre-wrap;margin:0}
  table.trees{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
  table.trees th,table.trees td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);
    vertical-align:top}
  table.trees th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  table.trees td.newick{font-family:ui-monospace,Menlo,monospace;font-size:12px;
    max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:8px}
  .fitem{display:flex;flex-direction:column;gap:3px}
  .fitem label{font-size:12px;color:var(--muted)}
  .fitem .name{color:var(--ink);font-weight:500}
  .fitem input,.fitem select{padding:7px 9px;border:1px solid var(--line);border-radius:7px;
    background:var(--bg);color:var(--ink);width:100%}
  .fitem input[type=checkbox]{width:auto}
  .fitem .hint{font-size:11px;color:var(--muted);line-height:1.35}
  .msg{margin-top:10px;font-size:13px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}
  footer{max-width:1000px;margin:0 auto;padding:0 22px 26px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header>
  <h1>Clann</h1>
  <span class="sub">web client · <span id="conn" class="chip">connecting…</span></span>
</header>

<main>
  <section class="card">
    <h2>Session &amp; data</h2>
    <dl class="kv">
      <dt>Input file</dt><dd id="s-file">—</dd>
      <dt>Taxa</dt><dd id="s-taxa">—</dd>
      <dt>Source trees</dt><dd id="s-trees">—</dd>
      <dt>Criterion</dt><dd id="s-crit">—</dd>
      <dt>In memory</dt><dd id="s-mem">—</dd>
    </dl>

    <label class="fld">Upload a source-tree file</label>
    <div class="row">
      <input type="file" id="file" />
      <button class="btn" id="upload">Upload</button>
    </div>

    <label class="fld">Loaded file</label>
    <div class="row">
      <select id="files"><option value="">— no files uploaded —</option></select>
      <button class="btn" id="load">Load</button>
    </div>

    <div class="row" style="margin-top:14px">
      <button class="btn" id="new-session">New session</button>
      <span class="muted" id="s-id"></span>
    </div>
    <div class="msg" id="data-msg"></div>
  </section>

  <section class="card">
    <h2>Run a command</h2>
    <label class="fld">Command</label>
    <select id="cmd" aria-label="Command"></select>
    <div class="blurb" id="cmd-blurb"></div>

    <div id="form"></div>

    <details style="margin-top:10px">
      <summary class="muted" style="cursor:pointer;font-size:13px">Advanced (extra raw options)</summary>
      <input type="text" id="opts" placeholder="e.g. maxswaps=500000" style="margin-top:6px" />
    </details>

    <div class="row" style="margin-top:12px">
      <button class="btn primary" id="run">Run</button>
      <span class="muted" id="run-cmd"></span>
    </div>
    <div class="msg" id="run-msg"></div>
  </section>

  <section class="card full" id="results-card" style="display:none">
    <h2>Results</h2>
    <div id="scores" class="muted"></div>
    <iframe id="viewer" title="Interactive tree viewer"
      style="display:none;width:100%;height:560px;border:1px solid var(--line);
             border-radius:10px;margin-top:12px;background:var(--bg)"></iframe>
    <details style="margin-top:12px">
      <summary class="muted" style="cursor:pointer">Trees (Newick)</summary>
      <div id="trees-wrap"></div>
    </details>
    <details style="margin-top:12px">
      <summary class="muted" style="cursor:pointer">Log</summary>
      <pre class="log" id="log"></pre>
    </details>
  </section>
</main>

<footer>Local session · bound to loopback · one live Clann engine.</footer>

<script>
const $ = (id) => document.getElementById(id);

async function api(path, opts) {
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, status: r.status, data };
}
const jpost = (path, body) =>
  api(path, { method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body || {}) });

function renderState(state) {
  if (!state) return;
  $("s-file").textContent  = state.input_file || "no file loaded";
  $("s-taxa").textContent  = state.num_taxa ?? "—";
  $("s-trees").textContent = state.num_source_trees ?? "—";
  $("s-crit").textContent  = state.criterion || "—";
  $("s-mem").textContent   = state.trees_in_memory ?? "—";
}

function renderFiles(files, selectName) {
  const sel = $("files");
  sel.innerHTML = "";
  if (!files || !files.length) {
    sel.innerHTML = '<option value="">— no files uploaded —</option>';
    return;
  }
  for (const f of files) {
    const o = document.createElement("option");
    o.value = o.textContent = f;
    sel.appendChild(o);
  }
  if (selectName) sel.value = selectName;
}

function msg(id, text, kind) {
  const el = $(id);
  el.textContent = text || "";
  el.className = "msg" + (kind ? " " + kind : "");
}

async function newSession() {
  const { ok, data } = await jpost("/api/session");
  if (ok) {
    renderState(data.state);
    renderFiles(data.files);
    $("s-id").textContent = "session " + (data.session_id || "").slice(0, 8);
    $("conn").textContent = "connected";
    $("conn").style.color = "var(--ok)";
    $("results-card").style.display = "none";
    msg("data-msg", ""); msg("run-msg", "");
  }
}

async function loadCommands() {
  const { ok, data } = await api("/api/commands");
  if (!ok) return;
  const sel = $("cmd");
  sel.innerHTML = "";
  for (const c of data.commands) {
    const o = document.createElement("option");
    o.value = c.name; o.textContent = c.name; o.dataset.blurb = c.blurb || "";
    sel.appendChild(o);
  }
  sel.onchange = () => {
    const o = sel.selectedOptions[0];
    $("cmd-blurb").textContent = o ? o.dataset.blurb : "";
    renderForm(sel.value);
  };
  sel.onchange();
}

// --- dynamic option form (Step 2.2) --------------------------------------
let currentSchema = { options: [] };

async function renderForm(cmd) {
  const { ok, data } = await api("/api/commands/" + encodeURIComponent(cmd) + "/schema");
  currentSchema = ok ? data : { options: [] };
  const form = $("form");
  form.innerHTML = "";
  const opts = currentSchema.options || [];
  if (!opts.length) return;
  const grid = document.createElement("div");
  grid.className = "form-grid";
  for (const o of opts) {
    const item = document.createElement("div");
    item.className = "fitem";
    const lab = document.createElement("label");
    lab.innerHTML = `<span class="name">${o.name}</span>`;
    let input;
    if (o.type === "enum") {
      input = document.createElement("select");
      for (const v of o.values || []) {
        const op = document.createElement("option");
        op.value = op.textContent = v;
        input.appendChild(op);
      }
      input.value = o.default ?? "";
    } else {
      input = document.createElement("input");
      input.type = (o.type === "int" || o.type === "float") ? "number" : "text";
      if (o.type === "float") input.step = "any";
      input.value = o.default ?? "";
      if (o.default === "") input.placeholder = o.type;
    }
    input.dataset.name = o.name;
    input.dataset.default = o.default ?? "";
    item.appendChild(lab);
    item.appendChild(input);
    if (o.help) {
      const h = document.createElement("div");
      h.className = "hint";
      h.textContent = o.help;
      item.appendChild(h);
    }
    grid.appendChild(item);
  }
  form.appendChild(grid);
}

function buildCommand(cmd) {
  const parts = [cmd];
  for (const input of $("form").querySelectorAll("[data-name]")) {
    const val = String(input.value).trim();
    const def = input.dataset.default ?? "";
    // include an option only when it has a value that differs from its default
    if (val !== "" && val !== def) parts.push(`${input.dataset.name}=${val}`);
  }
  const extra = $("opts").value.trim();
  if (extra) parts.push(extra);
  return parts.join(" ");
}

$("upload").onclick = async () => {
  const f = $("file").files[0];
  if (!f) { msg("data-msg", "Choose a file first.", "err"); return; }
  msg("data-msg", "Uploading " + f.name + "…");
  const r = await fetch("/api/files?name=" + encodeURIComponent(f.name),
                        { method: "POST", body: f });
  const data = await r.json().catch(() => ({}));
  if (r.ok) {
    renderFiles(data.files, data.stored);
    msg("data-msg", "Uploaded " + data.stored + ". Now click Load.", "ok");
  } else {
    msg("data-msg", data.error || "Upload failed.", "err");
  }
};

$("load").onclick = async () => {
  const file = $("files").value;
  if (!file) { msg("data-msg", "Upload a file first.", "err"); return; }
  msg("data-msg", "Loading " + file + "…");
  const { ok, data } = await jpost("/api/load", { file });
  if (ok && data.ok) {
    renderState(data.state);
    msg("data-msg", "Loaded " + file + " — " +
        data.state.num_source_trees + " trees, " + data.state.num_taxa + " taxa.", "ok");
  } else {
    msg("data-msg", data.error || "Load failed.", "err");
  }
};

$("run").onclick = async () => {
  const command = buildCommand($("cmd").value);
  $("run-cmd").textContent = "clann> " + command;
  $("run").disabled = true;
  msg("run-msg", "Running…");
  try {
    const { ok, data } = await jpost("/api/run", { command });
    if (!ok || data.ok === false) {
      msg("run-msg", data.error || "Command failed.", "err");
    } else {
      msg("run-msg", "Done.", "ok");
      renderState(data.state);
      renderResults(data);
    }
  } catch (e) {
    msg("run-msg", String(e), "err");
  } finally {
    $("run").disabled = false;
  }
};

function renderResults(data) {
  $("results-card").style.display = "";
  $("log").textContent = data.log || "(no output)";

  const trees = data.trees || [];
  const scores = data.scores || [];
  const viewer = $("viewer");
  if (data.has_viewer && trees.length) {
    viewer.style.display = "";
    viewer.src = "/api/viewer?t=" + Date.now();   // reload latest result
  } else {
    viewer.style.display = "none";
    viewer.removeAttribute("src");
  }
  if (trees.length) {
    const shown = scores.filter((s) => s !== null && s !== undefined);
    $("scores").textContent =
      trees.length + " tree" + (trees.length > 1 ? "s" : "") +
      (data.result_type ? " · " + data.result_type : "") +
      (shown.length ? " · scores: " + shown.join(", ") : "");
    let rows = "";
    trees.forEach((t) => {
      const sc = (t.score ?? "") + (t.dups != null ? ` (d${t.dups}/l${t.losses})` : "");
      rows += `<tr><td>${esc(t.name)}</td><td>${sc}</td>` +
              `<td class="newick" title="${esc(t.newick)}">${esc(t.newick)}</td></tr>`;
    });
    $("trees-wrap").innerHTML =
      `<table class="trees"><thead><tr><th>Tree</th><th>Score</th>` +
      `<th>Newick (current rooting)</th></tr></thead><tbody>${rows}</tbody></table>`;
  } else {
    $("scores").textContent = "";
    $("trees-wrap").innerHTML = "";
  }
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

$("new-session").onclick = newSession;

(async () => { await newSession(); await loadCommands(); })();
</script>
</body>
</html>
